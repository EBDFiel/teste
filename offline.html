<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - EBD Fiel</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      background: #07111f;
      color: white;
      text-align: center;
      padding: 24px;
    }
    .box {
      max-width: 420px;
      background: rgba(255,255,255,0.06);
      padding: 32px;
      border-radius: 20px;
    }
    h1 {
      margin-bottom: 12px;
    }
    p {
      color: #cbd5e1;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Você está offline</h1>
    <p>Não foi possível carregar a página agora. Verifique sua conexão e tente novamente.</p>
  </div>
</body>
</html>
