<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#4f46e5" />

  <title>Teste App</title>

  <!-- Manifest -->
  <link rel="manifest" href="./manifest.json" />

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 20px;
      text-align: center;
      font-size: 24px;
      font-weight: 600;
    }

    main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .card {
      background: #ffffff;
      color: #333;
      padding: 30px;
      border-radius: 20px;
      width: 100%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .card h2 {
      margin-bottom: 10px;
    }

    .status {
      margin-top: 15px;
      font-size: 14px;
      color: #666;
    }

    button {
      margin-top: 20px;
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      background: #4f46e5;
      color: white;
      cursor: pointer;
      font-weight: 600;
      transition: 0.3s;
    }

    button:hover {
      background: #4338ca;
    }

    footer {
      text-align: center;
      padding: 15px;
      font-size: 12px;
      opacity: 0.8;
    }

    .online {
      color: green;
    }

    .offline {
      color: red;
    }
  </style>
</head>
<body>

  <header>
    🚀 Meu App PWA
  </header>

  <main>
    <div class="card">
      <h2>Bem-vindo</h2>
      <p>Seu app está funcionando como PWA.</p>

      <div class="status">
        Status: <span id="status">verificando...</span>
      </div>

      <button onclick="window.location.reload()">
        🔄 Recarregar
      </button>
    </div>
  </main>

  <footer>
    Funciona offline ✔
  </footer>

  <!-- Script status online/offline -->
  <script>
    function updateStatus() {
      const status = document.getElementById("status");
      if (navigator.onLine) {
        status.textContent = "Online";
        status.className = "online";
      } else {
        status.textContent = "Offline";
        status.className = "offline";
      }
    }

    window.addEventListener("online", updateStatus);
    window.addEventListener("offline", updateStatus);
    updateStatus();
  </script>

  <!-- Service Worker (CORRETO) -->
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker
          .register("./service-worker.js")
          .then((reg) => {
            console.log("SW OK:", reg.scope);
          })
          .catch((err) => {
            console.error("Erro SW:", err);
          });
      });
    }
  </script>

</body>
</html>
