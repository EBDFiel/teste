<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lição - EBD Fiel</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #eef2f7;
    }

    .topbar {
      position: sticky;
      top: 0;
      background: #07111f;
      color: white;
      padding: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 999;
    }

    .back-btn {
      background: #f7b24d;
      border: none;
      border-radius: 10px;
      padding: 8px 12px;
      font-weight: bold;
      cursor: pointer;
    }

    .title {
      font-weight: bold;
    }

    .container {
      max-width: 900px;
      margin: 20px auto;
      padding: 10px;
    }

    .card {
      background: white;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    .cover {
      padding: 25px;
      background: linear-gradient(135deg, #f7b24d, #ffd18b);
      text-align: center;
    }

    .content {
      padding: 20px;
      line-height: 1.7;
      color: #334155;
    }

    .content h1 {
      margin-top: 0;
    }

    .share {
      text-align: center;
      padding: 20px;
    }

    .share button {
      background: #0ea5e9;
      color: white;
      border: none;
      padding: 12px 16px;
      border-radius: 12px;
      font-weight: bold;
      cursor: pointer;
    }

    .error {
      padding: 20px;
      background: #ffe4e4;
      color: #7f1d1d;
      border-radius: 10px;
      margin: 20px;
    }
  </style>
</head>

<body>

<div class="topbar">
  <button class="back-btn" onclick="voltar()">←</button>
  <div class="title" id="titulo">Lição</div>
</div>

<div class="container">
  <div class="card" id="app"></div>

  <div class="share">
    <button onclick="compartilhar()">
      <i class="fas fa-share"></i> Compartilhar app
    </button>
  </div>
</div>

<script>
function voltar() {
  window.location.href = "./index.html";
}

function mostrarErro(msg) {
  document.getElementById("app").innerHTML =
    "<div class='error'>" + msg + "</div>";
}

function render(licao) {
  if (!licao) {
    mostrarErro("Lição não encontrada.");
    return;
  }

  document.getElementById("titulo").innerText =
    licao.titulo || "Lição";

  let conteudo = "";

  try {
    conteudo = licao.conteudo || "<p>Sem conteúdo</p>";
  } catch (e) {
    conteudo = "<p>Erro ao carregar conteúdo</p>";
  }

  document.getElementById("app").innerHTML = `
    <div class="cover">
      <h2>${licao.titulo || "Lição"}</h2>
    </div>

    <div class="content">
      ${conteudo}
    </div>
  `;
}

// 🔥 CARREGAMENTO PRINCIPAL
try {
  const raw = sessionStorage.getItem("licaoAtual");

  if (!raw) {
    mostrarErro("Nenhuma lição foi encontrada.");
  } else {
    const licao = JSON.parse(raw);
    render(licao);
  }
} catch (e) {
  console.error(e);
  mostrarErro("Erro ao abrir a lição.");
}

// 🔥 SWIPE VOLTAR
let startX = 0;

document.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

document.addEventListener("touchend", e => {
  if (e.changedTouches[0].clientX - startX > 100) {
    voltar();
  }
});

// 🔥 COMPARTILHAR
function compartilhar() {
  const url = "https://ebdfiel.github.io/teste/";

  if (navigator.share) {
    navigator.share({
      title: "EBD Fiel",
      text: "Veja esta lição:",
      url: url
    });
  } else {
    navigator.clipboard.writeText(url);
    alert("Link copiado!");
  }
}
</script>

</body>
</html>
