<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lição - EBD Fiel</title>
  <style>
    body {
      margin: 0;
      background: #f6f8fb;
      font-family: Arial, sans-serif;
    }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: #07111f;
      color: white;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .back-btn {
      background: #f7b24d;
      color: #102131;
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: bold;
      cursor: pointer;
    }
    .content {
      min-height: 100vh;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <button class="back-btn" onclick="history.back()">← Voltar</button>
    <div id="titulo">Lição</div>
  </div>

  <div id="content" class="content"></div>

  <script>
    const titulo = localStorage.getItem("licaoAtualTitulo") || "Lição";
    const html = localStorage.getItem("licaoAtualHtml") || "<p>Conteúdo não encontrado.</p>";

    document.title = titulo + " - EBD Fiel";
    document.getElementById("titulo").textContent = titulo;
    document.getElementById("content").innerHTML = html;
  </script>
</body>
</html>
