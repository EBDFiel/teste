<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#07111f">
  <title>Lição - EBD Fiel</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root {
      --bg: #07111f;
      --bg-soft: #0c1828;
      --stroke: rgba(255,255,255,0.1);
      --text: #162331;
      --muted: #64748b;
      --primary: #f7b24d;
      --primary-2: #ff9800;
      --dark: #102131;
      --bottom-nav-height: 78px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(180deg, #f6f8fb 0%, #eef2f7 100%);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: calc(var(--bottom-nav-height) + 16px);
      opacity: 0;
      transform: translateY(10px);
      animation: pageEnter 0.35s ease forwards;
    }

    body.page-leaving {
      animation: pageLeave 0.25s ease forwards;
    }

    @keyframes pageEnter {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pageLeave {
      from {
        opacity: 1;
        transform: translateY(0);
      }
      to {
        opacity: 0;
        transform: translateY(8px);
      }
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: rgba(7,17,31,0.94);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      color: #fff;
    }

    .topbar-inner {
      width: min(calc(100% - 24px), 1100px);
      margin: 0 auto;
      min-height: 72px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
    }

    .back-btn {
      border: 0;
      border-radius: 16px;
      padding: 12px 14px;
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      color: var(--dark);
      font-weight: 800;
      font-size: 0.95rem;
      cursor: pointer;
      box-shadow: 0 10px 20px rgba(255, 152, 0, 0.22);
      transition: transform 0.18s ease, opacity 0.18s ease;
      flex-shrink: 0;
    }

    .back-btn:active {
      transform: scale(0.96);
    }

    .topbar-copy {
      min-width: 0;
    }

    .topbar-copy strong {
      display: block;
      font-size: 1rem;
      line-height: 1.2;
    }

    .topbar-copy span {
      display: block;
      color: #b9c8d6;
      font-size: 0.84rem;
      margin-top: 2px;
    }

    .loading-overlay {
      position: fixed;
      inset: 0;
      z-index: 5000;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(7,17,31,0.82);
      backdrop-filter: blur(10px);
      opacity: 0;
      visibility: hidden;
      transition: 0.25s ease;
    }

    .loading-overlay.show {
      opacity: 1;
      visibility: visible;
    }

    .loading-box {
      width: min(86vw, 300px);
      padding: 28px 24px;
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.06);
      box-shadow: 0 20px 40px rgba(0,0,0,0.25);
      text-align: center;
      color: #fff;
    }

    .loading-spinner {
      width: 46px;
      height: 46px;
      margin: 0 auto 14px;
      border-radius: 50%;
      border: 4px solid rgba(255,255,255,0.16);
      border-top-color: var(--primary);
      animation: spin 0.9s linear infinite;
    }

    .loading-box strong {
      display: block;
      margin-bottom: 4px;
      font-size: 1rem;
    }

    .loading-box p {
      color: #c7d2de;
      font-size: 0.92rem;
      margin: 0;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .page-shell {
      width: min(calc(100% - 24px), 980px);
      margin: 18px auto 0;
    }

    .content-wrap {
      background: #fff;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 18px 50px rgba(15,23,42,0.12);
      border: 1px solid rgba(15,23,42,0.06);
    }

    .content {
      min-height: calc(100vh - 180px);
    }

    .empty {
      max-width: 700px;
      margin: 40px auto;
      padding: 24px;
      text-align: center;
      color: #475569;
    }

    .bottom-app-nav {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: 10px;
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: space-around;
      gap: 8px;
      min-height: var(--bottom-nav-height);
      padding: 10px 12px max(10px, env(safe-area-inset-bottom));
      background: rgba(7,17,31,0.92);
      border: 1px solid rgba(255,255,255,0.09);
      backdrop-filter: blur(16px);
      border-radius: 24px;
      box-shadow: 0 24px 50px rgba(0,0,0,0.28);
    }

    .bottom-nav-link {
      flex: 1;
      min-height: 52px;
      border-radius: 18px;
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      color: #dce6ef;
      font-size: 0.78rem;
      font-weight: 700;
      text-decoration: none;
      transition: 0.2s ease;
    }

    .bottom-nav-link i {
      font-size: 1.05rem;
    }

    .bottom-nav-link.active,
    .bottom-nav-link:hover {
      background: rgba(255,255,255,0.08);
      color: #fff;
    }

    @media (max-width: 768px) {
      .topbar-inner {
        width: min(calc(100% - 20px), 980px);
      }

      .page-shell {
        width: min(calc(100% - 12px), 980px);
        margin-top: 10px;
      }

      .content-wrap {
        border-radius: 20px;
      }

      .topbar-copy strong {
        font-size: 0.94rem;
      }

      .topbar-copy span {
        font-size: 0.8rem;
      }
    }
  </style>
</head>
<body>
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-box">
      <div class="loading-spinner"></div>
      <strong>Carregando lição...</strong>
      <p>Organizando o conteúdo para leitura.</p>
    </div>
  </div>

  <header class="topbar">
    <div class="topbar-inner">
      <button class="back-btn" id="backBtn">
        <i class="fas fa-arrow-left"></i> Voltar
      </button>
      <div class="topbar-copy">
        <strong id="titulo">Lição</strong>
        <span>EBD Fiel • Escola Bíblica Dominical</span>
      </div>
    </div>
  </header>

  <main class="page-shell">
    <div class="content-wrap">
      <div id="content" class="content"></div>
    </div>
  </main>

  <nav class="bottom-app-nav" aria-label="Navegação inferior">
    <a href="./index.html#home" class="bottom-nav-link">
      <i class="fas fa-house"></i>
      <span>Início</span>
    </a>
    <a href="./index.html#adult-class" class="bottom-nav-link">
      <i class="fas fa-book-open"></i>
      <span>Adultos</span>
    </a>
    <a href="./index.html#youth-class" class="bottom-nav-link">
      <i class="fas fa-users"></i>
      <span>Jovens</span>
    </a>
    <a href="./index.html#about" class="bottom-nav-link">
      <i class="fas fa-circle-info"></i>
      <span>Sobre</span>
    </a>
  </nav>

  <script>
    const loadingOverlay = document.getElementById("loadingOverlay");

    function showLoading() {
      loadingOverlay.classList.add("show");
    }

    function hideLoading() {
      loadingOverlay.classList.remove("show");
    }

    function goBackWithAnimation() {
      showLoading();
      document.body.classList.add("page-leaving");

      setTimeout(() => {
        if (history.length > 1) {
          history.back();
        } else {
          window.location.href = "./index.html#home";
        }
      }, 240);
    }

    const titulo = localStorage.getItem("licaoAtualTitulo") || "Lição";
    const html = localStorage.getItem("licaoAtualHtml") ||
      "<div class='empty'><h2>Conteúdo não encontrado.</h2><p>Volte para a página principal e abra a lição novamente.</p></div>";

    document.title = titulo + " - EBD Fiel";
    document.getElementById("titulo").textContent = titulo;
    document.getElementById("content").innerHTML = html;

    window.addEventListener("load", () => {
      setTimeout(hideLoading, 180);
    });

    document.getElementById("backBtn").addEventListener("click", goBackWithAnimation);

    function setupSwipeBack() {
      let startX = 0;
      let startY = 0;
      let tracking = false;

      document.addEventListener("touchstart", (e) => {
        const touch = e.touches[0];
        startX = touch.clientX;
        startY = touch.clientY;
        tracking = startX <= 28;
      }, { passive: true });

      document.addEventListener("touchend", (e) => {
        if (!tracking) return;

        const touch = e.changedTouches[0];
        const deltaX = touch.clientX - startX;
        const deltaY = Math.abs(touch.clientY - startY);

        if (deltaX > 90 && deltaY < 80) {
          goBackWithAnimation();
        }

        tracking = false;
      }, { passive: true });
    }

    setupSwipeBack();
    showLoading();
  </script>
</body>
</html>
