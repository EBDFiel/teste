<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#07111f">
  <title>Lição - EBD Fiel</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root {
      --primary: #f7b24d;
      --primary-2: #ff9800;
      --dark: #102131;
      --bottom-nav-height: 78px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(180deg, #f6f8fb 0%, #eef2f7 100%);
      padding-bottom: calc(var(--bottom-nav-height) + 16px);
      opacity: 0;
      transform: translateY(10px);
      animation: pageEnter 0.35s ease forwards;
    }

    body.page-leaving {
      animation: pageLeave 0.25s ease forwards;
    }

    @keyframes pageEnter {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pageLeave {
      from { opacity: 1; transform: translateY(0); }
      to { opacity: 0; transform: translateY(8px); }
    }

    .topbar {
      position: sticky;
      top: 0;
      background: rgba(7,17,31,0.95);
      color: white;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 1000;
    }

    .back-btn {
      border: 0;
      border-radius: 14px;
      padding: 10px 14px;
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      color: var(--dark);
      font-weight: 800;
      cursor: pointer;
    }

    .content {
      background: white;
      border-radius: 20px;
      margin: 16px;
      padding: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    .share-app-wrap {
      padding: 10px 16px 30px;
      display: flex;
      justify-content: center;
    }

    .share-app-btn {
      border: 0;
      padding: 14px 18px;
      border-radius: 16px;
      background: linear-gradient(135deg, #1688dc, #0267b3);
      color: white;
      font-weight: 800;
      display: flex;
      gap: 10px;
      align-items: center;
      cursor: pointer;
    }

    .loading-overlay {
      position: fixed;
      inset: 0;
      background: rgba(7,17,31,0.8);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      opacity: 0;
      visibility: hidden;
      transition: .2s;
    }

    .loading-overlay.show {
      opacity: 1;
      visibility: visible;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .bottom-nav {
      position: fixed;
      bottom: 10px;
      left: 10px;
      right: 10px;
      background: #07111f;
      border-radius: 20px;
      display: flex;
      justify-content: space-around;
      padding: 10px;
      z-index: 1000;
    }

    .bottom-nav a {
      color: white;
      text-decoration: none;
      font-size: 12px;
      text-align: center;
    }
  </style>
</head>

<body>
  <div class="loading-overlay" id="loading">
    <div class="spinner"></div>
  </div>

  <div class="topbar">
    <button class="back-btn" onclick="voltar()">←</button>
    <div id="titulo">Lição</div>
  </div>

  <div id="content" class="content"></div>

  <div class="share-app-wrap">
    <button class="share-app-btn" id="shareBtn">
      <i class="fas fa-share-alt"></i> Compartilhar app
    </button>
  </div>

  <div class="bottom-nav">
    <a href="./index.html#home">🏠<br>Início</a>
    <a href="./index.html#adult-class">📖<br>Adultos</a>
    <a href="./index.html#youth-class">👥<br>Jovens</a>
  </div>

  <script>
    const loading = document.getElementById("loading");

    function showLoading() {
      loading.classList.add("show");
    }

    function hideLoading() {
      loading.classList.remove("show");
    }

    function voltar() {
      showLoading();
      document.body.classList.add("page-leaving");

      setTimeout(() => {
        history.back();
      }, 200);
    }

    const titulo = sessionStorage.getItem("licaoAtualTitulo") || "Lição";
    const html = sessionStorage.getItem("licaoAtualHtml") || "<p>Erro ao carregar</p>";

    document.getElementById("titulo").innerText = titulo;
    document.getElementById("content").innerHTML = html;

    window.onload = () => {
      setTimeout(hideLoading, 200);
    };

    let startX = 0;

    document.addEventListener("touchstart", e => {
      startX = e.touches[0].clientX;
    });

    document.addEventListener("touchend", e => {
      if (e.changedTouches[0].clientX - startX > 100) {
        voltar();
      }
    });

    document.getElementById("shareBtn").addEventListener("click", async () => {
      const url = "https://ebdfiel.github.io/teste/";

      if (navigator.share) {
        await navigator.share({
          title: "EBD Fiel",
          text: "Acesse as lições da EBD aqui:",
          url: url
        });
      } else {
        navigator.clipboard.writeText(url);
        alert("Link copiado!");
      }
    });

    showLoading();
  </script>
</body>
</html>
