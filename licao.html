<script>
  alert(sessionStorage.getItem("licaoAtual"));
  const loading = document.getElementById("loading");

  function showLoading() {
    loading.classList.add("show");
  }

  function hideLoading() {
    loading.classList.remove("show");
  }

  function voltar() {
    showLoading();
    document.body.classList.add("page-leaving");

    setTimeout(() => {
      if (history.length > 1) {
        history.back();
      } else {
        window.location.href = "./index.html#home";
      }
    }, 200);
  }

  function gerarConteudoHtml(licao) {
    if (!licao) {
      return "<p>Erro ao carregar conteúdo da lição.</p>";
    }

    const isYouth = licao.tipo === "youth";
    const primaryColor = isYouth ? "#3b82f6" : "#f7b24d";
    const darkColor = "#102131";

    return `
      <div class="container" style="width:min(100%,920px);max-width:920px;margin:0 auto;background:#fff;border-radius:28px;box-shadow:0 18px 50px rgba(15,23,42,0.12);overflow:hidden;border:1px solid rgba(15,23,42,0.06);">
        <div class="cover" style="padding:28px 28px 22px;background:linear-gradient(135deg, ${primaryColor}, ${isYouth ? "#60a5fa" : "#ffd18b"});color:${darkColor};">
          <div class="cover-top" style="display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;">
            <img src="https://i.imgur.com/B1CSSvW.png" alt="EBD Fiel Logo" style="max-height:68px;width:auto;">
            <span style="display:inline-flex;align-items:center;gap:8px;padding:8px 14px;border-radius:999px;background:rgba(255,255,255,0.45);font-size:0.86rem;font-weight:800;">
              <i class="fas fa-book-open"></i> ${isYouth ? "Classe Jovens" : "Classe Adultos"}
            </span>
          </div>
        </div>

        <div class="content-inner" style="padding:30px 28px;">
          ${licao.conteudo ? licao.conteudo : "<p><em>Conteúdo não disponível.</em></p>"}

          <div style="margin-top:28px;padding-top:22px;border-top:1px solid #e2e8f0;">
            <p><strong>Você está sendo edificado por este material? Então venha caminhar conosco também nas redes sociais.</strong></p>
            <p>A sua participação é muito importante. Ao curtir, comentar e compartilhar, você contribui para que o ensino da Palavra de Deus alcance ainda mais pessoas.</p>

            <div style="display:flex;flex-wrap:wrap;gap:10px;margin-top:14px;">
              <a href="https://www.instagram.com/ebdfiel/" target="_blank" style="display:inline-flex;align-items:center;gap:8px;min-height:42px;padding:0 14px;border-radius:999px;background:#f1f5f9;color:#162331;text-decoration:none;font-weight:700;">
                <i class="fab fa-instagram"></i> Instagram
              </a>
              <a href="https://www.youtube.com/@EBDFiel" target="_blank" style="display:inline-flex;align-items:center;gap:8px;min-height:42px;padding:0 14px;border-radius:999px;background:#f1f5f9;color:#162331;text-decoration:none;font-weight:700;">
                <i class="fab fa-youtube"></i> YouTube
              </a>
              <a href="https://www.tiktok.com/@ebdfiel" target="_blank" style="display:inline-flex;align-items:center;gap:8px;min-height:42px;padding:0 14px;border-radius:999px;background:#f1f5f9;color:#162331;text-decoration:none;font-weight:700;">
                <i class="fab fa-tiktok"></i> TikTok
              </a>
              <a href="https://www.facebook.com/EBDFiel/" target="_blank" style="display:inline-flex;align-items:center;gap:8px;min-height:42px;padding:0 14px;border-radius:999px;background:#f1f5f9;color:#162331;text-decoration:none;font-weight:700;">
                <i class="fab fa-facebook-f"></i> Facebook
              </a>
              <a href="https://chat.whatsapp.com/Lh4cvZW1DPMJ5ctHYWyyMC" target="_blank" style="display:inline-flex;align-items:center;gap:8px;min-height:42px;padding:0 14px;border-radius:999px;background:#25d366;color:white;text-decoration:none;font-weight:700;">
                <i class="fab fa-whatsapp"></i> Grupo de WhatsApp
              </a>
            </div>
          </div>
        </div>
      </div>
    `;
  }

  let licao = null;

  try {
    const raw = sessionStorage.getItem("licaoAtual");
    licao = raw ? JSON.parse(raw) : null;
  } catch (e) {
    console.error("Erro ao ler sessionStorage:", e);
  }

  document.getElementById("titulo").innerText = licao?.titulo || "Lição";
  document.getElementById("content").innerHTML = gerarConteudoHtml(licao);

  window.onload = () => {
    setTimeout(hideLoading, 200);
  };

  let startX = 0;

  document.addEventListener("touchstart", e => {
    startX = e.touches[0].clientX;
  });

  document.addEventListener("touchend", e => {
    if (e.changedTouches[0].clientX - startX > 100) {
      voltar();
    }
  });

  document.getElementById("shareBtn").addEventListener("click", async () => {
    const url = "https://ebdfiel.github.io/teste/";

    if (navigator.share) {
      await navigator.share({
        title: "EBD Fiel",
        text: "Acesse as lições da EBD aqui:",
        url: url
      });
    } else {
      navigator.clipboard.writeText(url);
      alert("Link copiado!");
    }
  });

  showLoading();
</script>
